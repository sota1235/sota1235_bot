name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!.env.example'
      - '!eslint.config.*'
      - '!.prettierrc.js'
      - '!appManifest.yaml'
      - '!.husky/**'
      - '!.github/**'
      - '!LICENSE.txt'
      - '!README.md'
      - '!renovate.json'

env:
  REGION: us-central1
  SERVICE_NAME: sota1235-bot
  REGISTRY: us-central1-docker.pkg.dev/sandbox-4affa/sota1235-bot

jobs:
  check-before-deploy:
    uses: ./.github/workflows/check-code-quality.yml

  deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs:
      - check-before-deploy

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - id: auth
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193' # v2.1.10
        with:
          workload_identity_provider: 'projects/166962166615/locations/global/workloadIdentityPools/github-sota1235-bot-deploy/providers/github'
          service_account: 'sota1235-bot-gae-deploy@sandbox-4affa.iam.gserviceaccount.com'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} -t ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest .

      - name: Push Docker image
        run: docker push ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }} --all-tags

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --image ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Slack Notification
        if: success()
        uses: tokorom/action-slack-incoming-webhook@main
        env:
          INCOMING_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ACTIONS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          text: "sota1235 Botがデプロイされました"
          attachments: |
            [
              {
                "color": "good",
                "author_name": "${{ github.actor }}",
                "author_icon": "${{ github.event.sender.avatar_url }}",
                "fields": [
                  {
                    "title": "Commit hash",
                    "value": "${{ github.sha }}",
                    "short": true
                  },
                  {
                    "title": "GitHub Actions URL",
                    "value": "${{ env.ACTIONS_URL }}"
                  }
                ]
              }
            ]
